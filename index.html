<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            let currentFetch = originalFetch;

            function defineAccessor(obj) {
              if (!obj) return false;
              try {
                Object.defineProperty(obj, 'fetch', {
                  configurable: true,
                  enumerable: true,
                  get() {
                    return currentFetch;
                  },
                  set(v) {
                    currentFetch = v;
                  }
                });
                return true;
              } catch (e) {
                return false;
              }
            }

            // Unconditionally define getters and setters at all possible levels
            // so that reassignment (e.g., window.fetch = ...) never throws "has only a getter"
            defineAccessor(window);
            if (typeof Window !== 'undefined' && Window.prototype) {
              defineAccessor(Window.prototype);
            }
            if (window.__proto__) {
              defineAccessor(window.__proto__);
            }
            if (typeof globalThis !== 'undefined') {
              defineAccessor(globalThis);
            }
          }
        } catch (e) {
          console.warn("Failed to patch window.fetch:", e);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="/manifest.json" />
    <title>TUHINEXT TV</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Clear any registered service workers to fix the white page issue caused by caching old assets
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          for (const registration of registrations) {
            registration.unregister().then(() => {
              console.log('ServiceWorker unregistered successfully');
            });
          }
        }).catch((err) => {
          console.error('Error unregistering ServiceWorker:', err);
        });
      }

      // Clear any stored Cache Storage caches containing old build assets
      if ('caches' in window) {
        caches.keys().then((keys) => {
          return Promise.all(keys.map((key) => caches.delete(key)));
        }).then(() => {
          console.log('All Cache Storage cleared successfully');
        }).catch((err) => {
          console.error('Error clearing caches:', err);
        });
      }
    </script>
  </body>
</html>
