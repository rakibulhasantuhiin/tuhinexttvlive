<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TUHINEXT TV - Live</title>
    <script>
      // Prevent "Cannot set property fetch" TypeError caused by whatwg-fetch in some players
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get: function() { return originalFetch; },
          set: function() { console.warn("Prevented polyfill from overwriting fetch"); },
          configurable: true
        });
      } catch (e) {
        console.error("Could not patch fetch:", e);
      }
    </script>
    <script>
      // Anti-Inspect Script to prevent easy access to DevTools
      document.addEventListener('contextmenu', event => event.preventDefault());
      document.addEventListener('keydown', event => {
        if (event.keyCode === 123 || // F12
            (event.ctrlKey && event.shiftKey && event.keyCode === 73) || // Ctrl+Shift+I
            (event.ctrlKey && event.shiftKey && event.keyCode === 74) || // Ctrl+Shift+J
            (event.ctrlKey && event.keyCode === 85)) { // Ctrl+U
          event.preventDefault();
          return false;
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
