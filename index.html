<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TUHINEXT TV - Live</title>
    <script>
      // Prevent "Cannot set property fetch" TypeError caused by whatwg-fetch in some players
      try {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          get: function() { return originalFetch; },
          set: function() { console.warn("Prevented polyfill from overwriting fetch"); },
          configurable: true
        });
      } catch (e) {
        console.error("Could not patch fetch:", e);
      }
    </script>
    <script>
      // Anti-Inspect Script to prevent easy access to DevTools
      const blockPage = () => {
        document.body.innerHTML = '<div style="display:flex;height:100vh;width:100vw;align-items:center;justify-content:center;background:#000;color:#fff;font-family:sans-serif;"><h1>Access Denied. Reloading...</h1></div>';
        setTimeout(() => window.location.reload(), 1000);
      };

      document.addEventListener('contextmenu', event => event.preventDefault());
      document.addEventListener('keydown', event => {
        if (event.keyCode === 123 || // F12
            (event.ctrlKey && event.shiftKey && event.keyCode === 73) || // Ctrl+Shift+I
            (event.ctrlKey && event.shiftKey && event.keyCode === 74) || // Ctrl+Shift+J
            (event.ctrlKey && event.keyCode === 85)) { // Ctrl+U
          event.preventDefault();
          blockPage();
          return false;
        }
      });
      
      setInterval(() => {
        const before = new Date().getTime();
        debugger;
        const after = new Date().getTime();
        if (after - before > 100) {
          blockPage();
        }
      }, 1000);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
